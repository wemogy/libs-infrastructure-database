name: Tests

on:
  workflow_dispatch:
  pull_request_target:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    # pull_request_target runs in the base repo context so secrets are available
    # for fork PRs. The workflow file itself always comes from the base branch
    # (trusted), but the checked-out code is from the PR head. Only enable this
    # if you trust that contributors cannot exfiltrate secrets through test code.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Start containers
        run: docker compose -f env/mongo/docker-compose.yaml up -d

      # .NET Tests
      - name: Build .NET
        uses: ./.github/actions/dotnet
        with:
          version: ${{ steps.release-version.outputs.next-version }}${{ github.event.inputs.version && 'pre' || '' }}

      - name: Test .NET Solution
        working-directory: src
        shell: bash
        run: dotnet test -c Release /p:CollectCoverage=true -m:1
        env:
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
          COSMOS_DATABASE_NAME: infrastructuredbtests

      - name: Stop containers
        # the containers should be stopped regardless of
        # the test result
        if: always()
        run: docker compose -f env/mongo/docker-compose.yaml down

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.0.2
        with:
          filename: src/coverage.cobertura.xml
          badge: true
          format: 'markdown'
          output: 'both'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request_target'
        with:
          recreate: true
          path: code-coverage-results.md
