name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v2

      - name: Start containers
        run: docker compose -f env/mongo/docker-compose.yaml up -d

      # .NET Tests
      - name: Build .NET
        uses: ./.github/actions/dotnet
        with:
          version: ${{ steps.release-version.outputs.next-version }}${{ github.event.inputs.version && 'pre' || '' }}

      - name: Test .NET Solution
        working-directory: src
        shell: bash
        run: |
          filter_args=()

          if [ -z "${COSMOS_CONNECTION_STRING}" ]; then
            echo "COSMOS_CONNECTION_STRING is not configured; skipping Cosmos integration tests."
            # The Cosmos test assembly exercises a live Cosmos DB connection.
            filter_args+=(--filter "FullyQualifiedName!~Wemogy.Infrastructure.Database.Cosmos.UnitTests")
          fi

          dotnet test -c Release /p:CollectCoverage=true -m:1 "${filter_args[@]}"
        env:
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
          COSMOS_DATABASE_NAME: infrastructuredbtests

      - name: Stop containers
        # the containers should be stopped regardless of
        # the test result
        if: always()
        run: docker compose -f env/mongo/docker-compose.yaml down

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.0.2
        with:
          filename: src/coverage.cobertura.xml
          badge: true
          format: 'markdown'
          output: 'both'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
